name: "Espressif IoT Development Framework (ESP-IDF)"
description: "This action builds your firmware for ESP32 directly in GitHub using an ESP-IDF Docker environment."

inputs:
  path:
    description: "Relative path under $GITHUB_WORKSPACE to place the repository"
    required: false
    default: ""

  idf_version:
    description: "ESP-IDF version to use"
    required: false
    default: "v5.3.1"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.idf_version }}
    - ${{ inputs.path }}